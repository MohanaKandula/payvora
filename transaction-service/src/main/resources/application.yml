server:
  port: 8083
  error:
    include-message: always

spring:
  application:
    name: transaction-service
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/transaction_db
    username: ${DB_USER:transaction_user}
    password: ${DB_PASSWORD:transaction_password}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

ledger-service:
  url: ${LEDGER_SERVICE_URL:http://localhost:8082}

account-service:
  url: ${ACCOUNT_SERVICE_URL:http://localhost:8081}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${ZIPKIN_TRACING_URL:http://localhost:9411/api/v2/spans}

treasury:
  yield:
    reserveShare: 80
    platformShare: 20
  limits:
    billsLimit: 80
    bondsLimit: 30
    mmfLimit: 25
    cashReserveMin: 5

