server:
  port: 8081

spring:
  application:
    name: account-service
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5431}/account_db
    username: ${DB_USER:account_user}
    password: ${DB_PASSWORD:account_password}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expirationMs: ${JWT_EXPIRATION_MS:3600000}       # 1 hour
  refreshExpirationMs: ${JWT_REFRESH_EXPIRATION_MS:86400000} # 24 hours

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${ZIPKIN_TRACING_URL:http://localhost:9411/api/v2/spans}

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  phone-number: ${TWILIO_PHONE_NUMBER:}

kyc:
  provider: ${KYC_PROVIDER:AWS}
  aws:
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
    region: ${AWS_REGION:us-east-1}
  google:
    project-id: ${GOOGLE_PROJECT_ID:}
    location: ${GOOGLE_LOCATION:us}
    processor-id: ${GOOGLE_DOC_AI_PROCESSOR_ID:}
    aadhaar-processor-id: ${GOOGLE_AADHAAR_PROCESSOR_ID:}
    passport-processor-id: ${GOOGLE_PASSPORT_PROCESSOR_ID:}
  stripe:
    api-key: ${STRIPE_API_KEY:}
